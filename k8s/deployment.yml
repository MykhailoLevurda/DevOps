apiVersion: apps/v1
kind: Deployment
metadata:
  name: mini-eshop
  namespace: mini-eshop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mini-eshop
  template:
    metadata:
      labels:
        app: mini-eshop
    spec:
      containers:
        - name: api
          image: ghcr.io/mykhailolevurda/devops:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mini-eshop-config
            - secretRef:
                name: mini-eshop-secrets
          readinessProbe:
            httpGet:
              path: /products
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /products
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
