version: '3.9'

services:
  db-test:
    image: postgres:16
    environment:
      POSTGRES_USER: eshop
      POSTGRES_PASSWORD: eshop
      POSTGRES_DB: eshop_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'eshop']
      interval: 5s
      timeout: 3s
      retries: 10
