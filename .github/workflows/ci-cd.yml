name: CI/CD

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mykhailolevurda/devops

jobs:
  # ── Stage 1: Build + Test ──────────────────────────────────────
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: eshop
          POSTGRES_PASSWORD: eshop
          POSTGRES_DB: eshop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint (staticka kontrola kvality)
        run: npm run lint

      - name: Unit testy s coverage
        run: npm run test:cov
        env:
          NODE_ENV: test

      - name: Integracni (e2e) testy
        run: npm run test:e2e -- --passWithNoTests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: eshop
          DB_PASSWORD: eshop
          DB_NAME: eshop_test
          NODE_ENV: test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  # ── Stage 2: Build + Push Docker Image ────────────────────────
  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Stage 3: Deploy do Staging (automaticky) ──────────────────
  deploy-staging:
    needs: docker-build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Start minikube
        uses: medyagh/setup-minikube@master

      - name: Deploy do staging
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/secret.yml
          kubectl apply -f k8s/postgres-pvc.yml
          kubectl apply -f k8s/postgres-deployment.yml
          kubectl apply -f k8s/postgres-service.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/ingress.yml

      - name: Pockej na rollout Postgres (staging)
        run: kubectl rollout status deployment/postgres -n staging --timeout=120s

      - name: Pockej na rollout (staging)
        run: kubectl rollout status deployment/mini-eshop -n staging --timeout=120s

      - name: Smoke test (staging)
        run: |
          kubectl port-forward svc/mini-eshop 3000:3000 -n staging &
          sleep 5
          curl -f http://localhost:3000/products

  # ── Stage 4: Deploy do Production (manualni schvaleni) ────────
  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Start minikube
        uses: medyagh/setup-minikube@master

      - name: Deploy do production
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/configmap.yml
          kubectl apply -f k8s/secret.yml
          kubectl apply -f k8s/postgres-pvc.yml
          kubectl apply -f k8s/postgres-deployment.yml
          kubectl apply -f k8s/postgres-service.yml
          kubectl apply -f k8s/deployment.yml
          kubectl apply -f k8s/service.yml
          kubectl apply -f k8s/ingress.yml

      - name: Pockej na rollout Postgres (production)
        run: kubectl rollout status deployment/postgres -n production --timeout=120s

      - name: Pockej na rollout (production)
        run: kubectl rollout status deployment/mini-eshop -n production --timeout=120s
